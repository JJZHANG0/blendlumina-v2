<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>购物车 - Blend Lumina</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="js/layout.js"></script>
  <style>
    .cart-page-banner {
      position: relative; width: 100%; height: 180px; overflow: hidden; background: #2d6a6a;
    }
    .cart-page-banner img {
      position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.35;
    }
    .cart-page-banner-content {
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      transform: translateX(-50%);
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      padding: 0 var(--page-gutter);
      z-index: 2;
    }
    .cart-page-banner-content h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 32px; font-weight: 700; color: #fff; letter-spacing: 4px;
    }

    .cart-layout {
      max-width: 1100px; margin: 0 auto; padding: 36px 24px 60px;
      display: grid; grid-template-columns: 1fr 320px; gap: 32px;
    }

    .cart-table { width: 100%; }
    .cart-header {
      display: grid; grid-template-columns: 3fr 1fr 1fr 80px;
      gap: 16px; padding: 0 0 12px; border-bottom: 2px solid #e8e0d0;
      font-size: 13px; font-weight: 700; color: #1a1a1a; text-transform: uppercase; letter-spacing: 1px;
    }
    .cart-item {
      display: grid; grid-template-columns: 3fr 1fr 1fr 80px;
      gap: 16px; padding: 20px 0; border-bottom: 1px solid #e8e0d0; align-items: center;
    }
    .cart-item-info { display: flex; gap: 16px; align-items: center; }
    .cart-item-img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
    .cart-item-name { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .cart-item-artist { font-size: 12px; color: #8a7a6a; }
    .cart-item-price { font-size: 15px; font-weight: 700; color: #2d6a6a; }
    .cart-qty-ctrl { display: flex; align-items: center; border: 1px solid #e0d8c8; border-radius: 4px; width: fit-content; }
    .cart-qty-btn { width: 30px; height: 30px; border: none; background: none; font-size: 16px; cursor: pointer; color: #5a5040; }
    .cart-qty-num { width: 36px; text-align: center; font-size: 14px; }
    .cart-remove { background: none; border: none; cursor: pointer; color: #c0a080; font-size: 18px; padding: 4px; transition: color 0.2s; }
    .cart-remove:hover { color: #e05050; }
    .cart-subtotal { font-size: 15px; font-weight: 700; color: #1a1a1a; }

    .cart-actions {
      display: flex; justify-content: space-between; margin-top: 20px; align-items: center;
    }
    .btn-continue {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid #2d6a6a; color: #2d6a6a; padding: 10px 20px;
      border-radius: 4px; text-decoration: none; font-size: 13px;
      transition: all 0.2s; background: #fff;
    }
    .btn-continue:hover { background: #f0f8f5; }

    /* Order summary */
    .order-summary {
      background: #faf8f4; border: 1px solid #e8e0d0; border-radius: 12px; padding: 24px;
      position: sticky; top: 80px; align-self: start;
    }
    .order-summary h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px; font-weight: 700; color: #1a1a1a;
      margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #e8e0d0;
    }
    .summary-row { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 12px; }
    .summary-row.total { font-size: 18px; font-weight: 700; color: #1a1a1a; padding-top: 12px; border-top: 1px solid #e8e0d0; }
    .summary-row span:last-child { color: #2d6a6a; font-weight: 600; }
    .summary-row.total span:last-child { font-size: 22px; }
    .btn-checkout {
      display: block; width: 100%; padding: 14px; background: #2d6a6a;
      color: #fff; border: none; border-radius: 6px; font-size: 15px; font-weight: 600;
      cursor: pointer; text-align: center; text-decoration: none; margin-top: 20px;
      transition: background 0.2s;
    }
    .btn-checkout:hover { background: #1e4e4e; }
    .summary-note { font-size: 11px; color: #8a7a6a; margin-top: 12px; line-height: 1.7; }
    .giving-summary-note {
      margin-top: 12px;
      border: 1px solid #d8ebe6;
      background: #f2fbf8;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11px;
      color: #44655e;
      line-height: 1.8;
    }

    /* Checkout flow modal */
    .checkout-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 9998;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .checkout-overlay.show { display: flex; }
    .checkout-modal {
      width: min(560px, 100%);
      border-radius: 12px;
      background: #fff;
      border: 1px solid #e3ddd1;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.2);
      overflow: hidden;
    }
    .checkout-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 18px;
      border-bottom: 1px solid #eee6d9;
      background: #faf8f4;
    }
    .checkout-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      color: #1a1a1a;
    }
    .checkout-close {
      border: none;
      background: none;
      font-size: 20px;
      color: #8a7a6a;
      cursor: pointer;
    }
    .checkout-body { padding: 18px; }
    .checkout-steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }
    .checkout-step {
      text-align: center;
      font-size: 12px;
      border-radius: 999px;
      padding: 7px 6px;
      background: #f3efe7;
      color: #8a7a6a;
    }
    .checkout-step.active {
      background: #2d6a6a;
      color: #fff;
    }
    .checkout-panel {
      border: 1px solid #ece4d6;
      border-radius: 10px;
      padding: 14px;
      background: #fffdf9;
      font-size: 13px;
      color: #4e4a42;
      line-height: 1.9;
      min-height: 120px;
    }
    .checkout-panel h4 {
      font-size: 14px;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .checkout-foot {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 14px;
    }
    .checkout-btn {
      border: 1px solid #d7d1c5;
      background: #fff;
      color: #5a5040;
      border-radius: 6px;
      padding: 9px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .checkout-btn.primary {
      border-color: #2d6a6a;
      background: #2d6a6a;
      color: #fff;
    }
    .charity-popup {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: min(520px, calc(100vw - 28px));
      border-radius: 12px;
      border: 1px solid #d5e7e1;
      background: #f6fcfa;
      box-shadow: 0 24px 58px rgba(0, 0, 0, 0.2);
      z-index: 10000;
      padding: 20px 18px 16px;
      display: none;
    }
    .charity-popup.show { display: block; }
    .charity-popup h4 {
      font-family: 'Noto Serif SC', serif;
      font-size: 18px;
      color: #1e4e4e;
      margin-bottom: 10px;
    }
    .charity-popup p {
      font-size: 13px;
      color: #3e5953;
      line-height: 1.9;
      margin-bottom: 12px;
    }

    .empty-cart { text-align: center; padding: 60px 0; }
    .empty-cart .icon { font-size: 60px; margin-bottom: 16px; }
    .empty-cart h3 { font-size: 18px; color: #5a5040; margin-bottom: 8px; }
    .empty-cart p { font-size: 14px; color: #8a7a6a; margin-bottom: 24px; }

    @media (max-width: 900px) {
      .cart-layout { grid-template-columns: 1fr; }
      .cart-header { display: none; }
      .cart-item { grid-template-columns: 1fr; }
      .order-summary { position: static; }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main>
    <!-- BANNER -->
    <div class="cart-page-banner">
      <img src="https://sspark.genspark.ai/cfimages?u1=9pqgxEY%2FS9Rcfijtqtpth5%2FDobnydGDH%2FxlTEF6VMOvbJINJwEbbP5LpOknOT%2BL7XdtxreXcawmy%2FIhFghFK6%2B7%2F7nmABMz6SvnQ0%2B9BkYyv5Uq21JqAbd4M%2Bok2pNLLGOcNJ8hYl0m1lpf%2BVyt2D%2FEVbldwoDEFsw%3D%3D&u2=P85zD7zoy8UfO%2BUb&width=2560" alt="购物车背景">
      <div class="cart-page-banner-content">
        <h1><i class="fas fa-shopping-cart" style="margin-right:16px;"></i>我的购物车</h1>
      </div>
    </div>

    <div class="cart-layout">
      <div class="cart-table">
        <div class="cart-header">
          <span>商品信息</span>
          <span>单价</span>
          <span>数量</span>
          <span>小计</span>
        </div>

        <div id="cart-items-container">
          <!-- Dynamic cart items rendered by JS -->
        </div>

        <div class="cart-actions">
          <a href="shop.html" class="btn-continue"><i class="fas fa-arrow-left"></i> 继续购物</a>
          <button onclick="clearCart()" style="background:none;border:1px solid #e0d8c8;padding:10px 20px;border-radius:4px;font-size:13px;color:#8a7a6a;cursor:pointer;">清空购物车</button>
        </div>
      </div>

      <aside class="order-summary">
        <h3>订单摘要</h3>
        <div class="summary-row"><span>商品小计</span><span id="subtotal">¥0</span></div>
        <div class="summary-row"><span>运费</span><span>免运费</span></div>
        <div class="summary-row"><span>公益捐赠 (3%)</span><span id="donation">¥0</span></div>
        <div class="summary-row total"><span>合计</span><span id="total">¥0</span></div>
        <button class="btn-checkout" id="btn-checkout-flow">去结算</button>
        <p class="summary-note">✓ 顺丰包邮&emsp;✓ 7天无忧退换&emsp;✓ 正品保障</p>
        <p class="giving-summary-note">感谢你的支持。项目收益将用于云南乡村小学的实际需求，相关进展也将持续更新。</p>
      </aside>
    </div>
  </main>

  <div class="checkout-overlay" id="checkout-overlay">
    <div class="checkout-modal" role="dialog" aria-modal="true" aria-label="结算流程">
      <div class="checkout-head">
        <p class="checkout-title">结算流程（模拟）</p>
        <button class="checkout-close" id="checkout-close" aria-label="关闭">×</button>
      </div>
      <div class="checkout-body">
        <div class="checkout-steps">
          <div class="checkout-step active" data-step="1">1. 确认信息</div>
          <div class="checkout-step" data-step="2">2. 选择支付</div>
          <div class="checkout-step" data-step="3">3. 完成支付</div>
        </div>
        <div class="checkout-panel" id="checkout-panel"></div>
        <div class="checkout-foot">
          <button class="checkout-btn" id="checkout-prev">上一步</button>
          <button class="checkout-btn primary" id="checkout-next">下一步</button>
        </div>
      </div>
    </div>
  </div>

  <div class="charity-popup" id="charity-popup">
    <h4><i class="fas fa-hand-holding-heart" style="margin-right:8px;"></i>感谢你的支持</h4>
    <p>项目收益将用于云南乡村小学的实际需求，相关进展也将持续更新。</p>
    <button class="checkout-btn primary" id="charity-close">我知道了</button>
  </div>

  <div id="site-footer"></div>
  <script src="js/common.js"></script>
  <script>
    const defaultCart = [
      { id: 'tiedye1', name: '白族靛蓝扎染围巾', artist: '云染工坊', price: 680, qty: 1,
        img: 'https://sspark.genspark.ai/cfimages?u1=X5EGQxA71XU%2B3O8LDcSTWEWvFTjR9LJg6wtYcHSD4Y1wqFG8I%2B1w0Hog1XmQSa2K4EzzjX4EeLOGhf8FU4%2FFSrirU76xCkRpz35Bhs%2FAMPCfb42FlFoIPCMLzADdlaofLFdc5BTVV%2Bep5JMAef37lfSl%2Fi%2BnAjalCe7cv6gAAth9bmxnci2GkeTdMWw%2B8JRui2C7zDRGqY6T%2F9Av%2Fbo8NFkCCxa84w%3D%3D&u2=TW3vLhGfj6khVPzG&width=2560' },
      { id: 'f1', name: '竹编·四季提篮', artist: '桂竹手艺', price: 480, qty: 2,
        img: 'https://sspark.genspark.ai/cfimages?u1=mAdP6tPhy%2FyslYoo0c96tTqzC69QsYvDTvO%2Bu2QInzJFRzpWCPt%2FAJ7A37dQCywR60adYzzwpAzi3EYZeXrk7AKdkjzTbIBHlZ5UbuoTdOVoKiqABTshnDweSc4r%2Bl8vOWmHxZMwQ6ku%2Fb%2B8wsOMH4334DPx7GORu3AROBRmhPDHHhuda8jBYrosLrai6MZQm%2Ffj3mObJeq%2BJSC%2F7oAR2BD%2FYK34gQr0dgj9AStjHdLtRmPIPNp82jzqKhsl8E75qUtzEdN3BQJAOcI%3D&u2=nKeZynzsu5%2BT27hq&width=2560' }
    ];

    let cart = JSON.parse(localStorage.getItem('bl_cart') || 'null') || defaultCart;

    function saveCart() {
      localStorage.setItem('bl_cart', JSON.stringify(cart));
    }
    function renderCart() {
      const container = document.getElementById('cart-items-container');
      if (cart.length === 0) {
        container.innerHTML = `<div class="empty-cart"><div class="icon">🛒</div><h3>购物车是空的</h3><p>去发现你喜欢的艺术作品吧</p><a href="shop.html" class="btn-checkout" style="display:inline-block;width:auto;padding:12px 28px;">去探索</a></div>`;
        document.getElementById('subtotal').textContent = '¥0';
        document.getElementById('donation').textContent = '¥0';
        document.getElementById('total').textContent = '¥0';
        return;
      }
      container.innerHTML = cart.map((item, idx) => `
        <div class="cart-item">
          <div class="cart-item-info">
            <img class="cart-item-img" src="${item.img}" alt="${item.name}">
            <div>
              <p class="cart-item-name">${item.name}</p>
              <p class="cart-item-artist">${item.artist}</p>
            </div>
          </div>
          <div class="cart-item-price">¥${item.price.toLocaleString()}</div>
          <div class="cart-qty-ctrl">
            <button class="cart-qty-btn" onclick="changeQty(${idx},-1)">-</button>
            <span class="cart-qty-num">${item.qty}</span>
            <button class="cart-qty-btn" onclick="changeQty(${idx},1)">+</button>
          </div>
          <div style="display:flex;align-items:center;gap:8px;">
            <span class="cart-subtotal">¥${(item.price * item.qty).toLocaleString()}</span>
            <button class="cart-remove" onclick="removeItem(${idx})"><i class="fas fa-trash-alt"></i></button>
          </div>
        </div>
      `).join('');
      const subtotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
      const donation = Math.round(subtotal * 0.03);
      document.getElementById('subtotal').textContent = '¥' + subtotal.toLocaleString();
      document.getElementById('donation').textContent = '¥' + donation.toLocaleString();
      document.getElementById('total').textContent = '¥' + (subtotal + donation).toLocaleString();
    }
    function changeQty(idx, delta) {
      cart[idx].qty = Math.max(1, cart[idx].qty + delta);
      saveCart(); renderCart();
    }
    function removeItem(idx) {
      cart.splice(idx, 1);
      saveCart(); renderCart();
    }
    function clearCart() {
      if (confirm('确定要清空购物车吗？')) { cart = []; saveCart(); renderCart(); }
    }

    const checkoutOverlay = document.getElementById('checkout-overlay');
    const checkoutPanel = document.getElementById('checkout-panel');
    const checkoutPrev = document.getElementById('checkout-prev');
    const checkoutNext = document.getElementById('checkout-next');
    const charityPopup = document.getElementById('charity-popup');
    let checkoutStep = 1;

    function renderCheckoutStep() {
      document.querySelectorAll('.checkout-step').forEach(el => {
        const stepNum = Number(el.dataset.step);
        el.classList.toggle('active', stepNum <= checkoutStep);
      });
      checkoutPrev.style.display = checkoutStep === 1 ? 'none' : 'inline-block';

      if (checkoutStep === 1) {
        checkoutPanel.innerHTML = `
          <h4>确认收货与订单信息</h4>
          <p>收货人：张同学（演示）<br>电话：138****8888<br>地址：杭州市西湖区文三路 88 号</p>
          <p>订单商品与金额已在右侧摘要同步。确认无误后进入支付方式选择。</p>
        `;
        checkoutNext.textContent = '下一步';
      } else if (checkoutStep === 2) {
        checkoutPanel.innerHTML = `
          <h4>选择支付方式</h4>
          <p>已选择：微信支付（演示）<br>你也可以切换为支付宝 / 银行卡（当前为前端模拟流程）。</p>
          <p>点击“确认支付”后将模拟支付成功并完成下单。</p>
        `;
        checkoutNext.textContent = '确认支付';
      } else {
        checkoutPanel.innerHTML = `
          <h4>支付成功</h4>
          <p>订单已创建，感谢你的购买。我们会尽快安排发货，你可在“我的账号”中查看订单状态。</p>
        `;
        checkoutNext.textContent = '完成';
      }
    }

    function openCheckoutFlow() {
      if (!cart.length) {
        alert('购物车为空，先添加商品再结算。');
        return;
      }
      checkoutStep = 1;
      renderCheckoutStep();
      checkoutOverlay.classList.add('show');
    }

    function closeCheckoutFlow() {
      checkoutOverlay.classList.remove('show');
    }

    document.getElementById('btn-checkout-flow').addEventListener('click', openCheckoutFlow);
    document.getElementById('checkout-close').addEventListener('click', closeCheckoutFlow);
    checkoutOverlay.addEventListener('click', (e) => {
      if (e.target === checkoutOverlay) closeCheckoutFlow();
    });

    checkoutPrev.addEventListener('click', () => {
      checkoutStep = Math.max(1, checkoutStep - 1);
      renderCheckoutStep();
    });

    checkoutNext.addEventListener('click', () => {
      if (checkoutStep < 3) {
        checkoutStep += 1;
        renderCheckoutStep();
      } else {
        closeCheckoutFlow();
        cart = [];
        saveCart();
        renderCart();
        charityPopup.classList.add('show');
      }
    });

    document.getElementById('charity-close').addEventListener('click', () => {
      charityPopup.classList.remove('show');
      window.location.href = 'user-center.html';
    });

    renderCart();
  </script>
</body>
</html>
