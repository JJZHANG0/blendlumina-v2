<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>艺术家 - Blend Lumina</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="js/layout.js"></script>
  <style>
    .ap-hero {
      position: relative;
      min-height: 320px;
      background: #1a2a28;
    }
    .ap-hero-cover {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }
    .ap-hero-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 40%;
      opacity: 0.55;
    }
    .ap-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(26,42,40,0.2) 0%, rgba(26,42,40,0.92) 100%);
    }
    .ap-hero-inner {
      position: relative;
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px var(--page-gutter) 56px;
      z-index: 2;
    }
    .ap-breadcrumb {
      font-size: 12px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 20px;
    }
    .ap-breadcrumb a { color: #9dd4cf; text-decoration: none; }
    .ap-breadcrumb a:hover { text-decoration: underline; }
    .ap-head {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 24px;
    }
    .ap-avatar-wrap {
      flex-shrink: 0;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid rgba(255,255,255,0.35);
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    .ap-avatar-wrap img { width: 100%; height: 100%; object-fit: cover; }
    .ap-head-text { flex: 1; min-width: 200px; }
    .ap-head-text h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 34px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 3px;
      margin-bottom: 8px;
    }
    .ap-role {
      font-size: 14px;
      color: #b8dfd8;
      margin-bottom: 6px;
    }
    .ap-loc {
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      letter-spacing: 1px;
    }
    .ap-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }
    .ap-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s, border-color 0.2s;
    }
    .ap-btn-primary {
      background: #fff;
      color: #1f6a6b;
      border: 1px solid #fff;
    }
    .ap-btn-primary:hover { background: #eef8f6; }
    .ap-btn-ghost {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
    }
    .ap-btn-ghost:hover { background: rgba(255,255,255,0.18); }

    .ap-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px var(--page-gutter) 64px;
    }
    .ap-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 40px;
      align-items: start;
    }
    .ap-section {
      margin-bottom: 40px;
    }
    .ap-section h2 {
      font-family: 'Noto Serif SC', serif;
      font-size: 20px;
      color: #1a1a1a;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 2px solid #1f6a6b;
      display: inline-block;
    }
    .ap-bio p {
      font-size: 14px;
      color: #4a504e;
      line-height: 2;
      margin-bottom: 14px;
    }
    .ap-skills {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }
    .ap-skill {
      background: linear-gradient(145deg, #f6fbfa, #eef5f3);
      border: 1px solid #d8e8e4;
      border-radius: 10px;
      padding: 16px 18px;
    }
    .ap-skill h3 {
      font-size: 14px;
      font-weight: 700;
      color: #1f6a6b;
      margin-bottom: 8px;
    }
    .ap-skill p { font-size: 13px; color: #5a6562; line-height: 1.75; }

    .ap-works-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
    }
    .ap-work {
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #e8e0d0;
      text-decoration: none;
      background: #fff;
      transition: box-shadow 0.2s, transform 0.2s;
      display: flex;
      flex-direction: column;
    }
    .ap-work:hover {
      box-shadow: 0 10px 28px rgba(0,0,0,0.1);
      transform: translateY(-3px);
    }
    .ap-work img { width: 100%; height: 160px; object-fit: cover; }
    .ap-work-body { padding: 12px 14px 14px; flex: 1; }
    .ap-work-title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .ap-work-price { font-size: 15px; font-weight: 700; color: #1f6a6b; }

    .ap-side {
      position: sticky;
      top: 88px;
      background: #faf8f4;
      border: 1px solid #ece6da;
      border-radius: 12px;
      padding: 22px;
    }
    .ap-side h3 {
      font-family: 'Noto Serif SC', serif;
      font-size: 16px;
      color: #1a1a1a;
      margin-bottom: 14px;
    }
    .ap-stat {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 8px 0;
      border-bottom: 1px solid #e8e0d0;
      color: #5a5040;
    }
    .ap-stat span:last-child { font-weight: 700; color: #1f6a6b; }

    .ap-notfound {
      text-align: center;
      padding: 80px 20px;
      max-width: 480px;
      margin: 0 auto;
    }
    .ap-notfound h1 { font-size: 22px; margin-bottom: 12px; color: #1a1a1a; }
    .ap-notfound p { color: #8a7a6a; margin-bottom: 24px; line-height: 1.8; }

    @media (max-width: 900px) {
      .ap-grid { grid-template-columns: 1fr; }
      .ap-side { position: static; }
      .ap-skills { grid-template-columns: 1fr; }
      .ap-works-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .ap-works-grid { grid-template-columns: 1fr; }
      .ap-head-text h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div id="site-header"></div>
  <main id="ap-main">
    <div class="ap-notfound" id="ap-notfound" style="display:none;">
      <h1>未找到该艺术家</h1>
      <p>链接可能不正确，或该创作者尚未上架。请返回艺术家列表浏览全部入驻创作者。</p>
      <a href="artists.html" class="ap-btn ap-btn-primary" style="display:inline-flex;"><i class="fas fa-arrow-left"></i> 返回艺术家列表</a>
    </div>

    <div id="ap-content" style="display:none;">
      <section class="ap-hero">
        <div class="ap-hero-cover"><img id="ap-cover" src="" alt=""></div>
        <div class="ap-hero-overlay"></div>
        <div class="ap-hero-inner">
          <p class="ap-breadcrumb"><a href="index.html">首页</a> <span>/</span> <a href="artists.html">艺术家</a> <span>/</span> <span id="ap-crumb-name"></span></p>
          <div class="ap-head">
            <div class="ap-avatar-wrap"><img id="ap-avatar" src="" alt=""></div>
            <div class="ap-head-text">
              <h1 id="ap-name"></h1>
              <p class="ap-role" id="ap-role"></p>
              <p class="ap-loc" id="ap-loc"></p>
            </div>
            <div class="ap-actions">
              <a href="shop.html" class="ap-btn ap-btn-primary" id="ap-shop"><i class="fas fa-store"></i> 查看作品</a>
              <a href="artists.html" class="ap-btn ap-btn-ghost"><i class="fas fa-users"></i> 更多艺术家</a>
            </div>
          </div>
        </div>
      </section>

      <div class="ap-body">
        <div class="ap-grid">
          <div>
            <section class="ap-section">
              <h2>关于</h2>
              <div class="ap-bio" id="ap-bio"></div>
            </section>
            <section class="ap-section">
              <h2>技艺与方向</h2>
              <div class="ap-skills" id="ap-skills"></div>
            </section>
            <section class="ap-section">
              <h2>代表作品</h2>
              <div class="ap-works-grid" id="ap-works"></div>
            </section>
          </div>
          <aside class="ap-side">
            <h3>档案</h3>
            <div class="ap-stat"><span>上架作品</span><span id="ap-st-works"></span></div>
            <div class="ap-stat"><span>创作领域</span><span id="ap-st-field"></span></div>
            <div class="ap-stat"><span>所在地区</span><span id="ap-st-loc"></span></div>
            <p style="font-size:12px;color:#8a7a6a;margin-top:16px;line-height:1.7;">以上信息为展示用途，正式合作与购买请以作品页与平台规则为准。</p>
          </aside>
        </div>
      </div>
    </div>
  </main>
  <div id="site-footer"></div>
  <script src="js/common.js"></script>

    function getSlug() {
      const p = new URLSearchParams(window.location.search);
      return (p.get('id') || p.get('slug') || '').trim().toLowerCase();
    }

    function render(a) {
      document.getElementById('ap-notfound').style.display = 'none';
      document.getElementById('ap-content').style.display = 'block';
      document.title = a.name + ' - Blend Lumina';
      document.getElementById('ap-cover').src = a.cover || a.avatar;
      document.getElementById('ap-cover').alt = a.name + ' 封面';
      document.getElementById('ap-avatar').src = a.avatar;
      document.getElementById('ap-avatar').alt = a.name;
      document.getElementById('ap-crumb-name').textContent = a.name;
      document.getElementById('ap-name').textContent = a.name;
      document.getElementById('ap-role').textContent = a.role;
      document.getElementById('ap-loc').innerHTML = '<i class="fas fa-location-dot" style="margin-right:6px;opacity:0.85;"></i>' + a.loc;
      document.getElementById('ap-bio').innerHTML = (a.bio || []).map(t => '<p>' + t + '</p>').join('');
      document.getElementById('ap-skills').innerHTML = (a.skills || []).map(s =>
        '<div class="ap-skill"><h3>' + s.title + '</h3><p>' + s.desc + '</p></div>'
      ).join('');
      document.getElementById('ap-works').innerHTML = (a.works || []).map(w =>
        '<a class="ap-work" href="' + w.href + '"><img src="' + w.img + '" alt="' + w.title + '"><div class="ap-work-body"><div class="ap-work-title">' + w.title + '</div><div class="ap-work-price">' + w.price + '</div></div></a>'
      ).join('');
      document.getElementById('ap-st-works').textContent = (a.worksCount != null ? a.worksCount : (a.works || []).length) + ' 件';
      document.getElementById('ap-st-field').textContent = (a.role || '').split('·')[0].trim() || '—';
      document.getElementById('ap-st-loc').textContent = (a.loc || '').replace(/^中国 · /, '') || '—';
      document.getElementById('ap-shop').href = 'shop.html?q=' + encodeURIComponent(a.name);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const slug = getSlug();
      const a = ARTIST_DB[slug];
      if (!slug || !a) {
        document.getElementById('ap-notfound').style.display = 'block';
        document.getElementById('ap-content').style.display = 'none';
        document.title = '未找到 - Blend Lumina';
        return;
      }
      render(a);
    });
  </script>
