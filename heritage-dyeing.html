<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>染织与纤维 - Blend Lumina</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  <script src="js/layout.js"></script>
  <style>
    .page-banner {
      position: relative; width: 100%; height: 420px;
      overflow: hidden; background: #e8eff0;
    }
    .page-banner img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover; object-position: center;
    }
    .page-banner-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(232,239,240,0.95) 35%, rgba(232,239,240,0.55) 65%, transparent 100%);
    }
    .page-banner-content {
      position: absolute; top: 50%; left: 0; transform: translateY(-50%);
      padding: 0 6%; z-index: 3; max-width: 560px;
    }
    .page-banner-content h1 {
      font-family: 'Noto Serif SC', serif;
      font-size: 40px; font-weight: 700; color: #1a2a2a;
      letter-spacing: 4px; margin-bottom: 12px; line-height: 1.3;
    }
    .page-banner-content p { font-size: 14px; color: #3a5050; line-height: 1.9; max-width: 380px; }

    .nav-tabs-bar {
      background: #fff; border-bottom: 1px solid #e0e8e8;
      position: sticky; top: 60px; z-index: 100;
    }
    .nav-tabs-inner {
      max-width: 1200px; margin: 0 auto; padding: 0 24px;
      display: flex; gap: 0; overflow-x: auto;
    }
    .nav-tab {
      padding: 14px 24px; font-size: 14px; color: #5a5040;
      text-decoration: none; border-bottom: 2px solid transparent;
      white-space: nowrap; transition: all 0.2s;
    }
    .nav-tab:hover { color: #2d6a6a; }
    .nav-tab.active { color: #2d6a6a; border-bottom-color: #2d6a6a; font-weight: 600; }

    /* Two-column layout */
    .listing-layout {
      max-width: 1200px; margin: 0 auto; padding: 36px 24px 60px;
      display: grid; grid-template-columns: 240px 1fr; gap: 32px;
    }
    /* Filter sidebar */
    .filter-sidebar { position: sticky; top: 120px; align-self: start; }
    .filter-group { margin-bottom: 28px; }
    .filter-group h4 {
      font-size: 13px; font-weight: 700; color: #1a1a1a;
      margin-bottom: 12px; padding-bottom: 8px;
      border-bottom: 1px solid #e8e0d0; text-transform: uppercase; letter-spacing: 1px;
    }
    .filter-option {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 8px; cursor: pointer;
    }
    .filter-option input[type="checkbox"] { accent-color: #2d6a6a; }
    .filter-option label { font-size: 13px; color: #5a5040; cursor: pointer; }
    .filter-range { display: flex; align-items: center; gap: 8px; }
    .filter-range input {
      width: 80px; padding: 6px 8px; border: 1px solid #e0d8c8;
      border-radius: 4px; font-size: 12px; color: #1a1a1a;
    }
    .filter-apply {
      display: block; width: 100%; padding: 10px;
      background: #2d6a6a; color: #fff; border: none;
      border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-align: center; margin-top: 16px;
      transition: background 0.2s;
    }
    .filter-apply:hover { background: #1e4e4e; }

    /* Product list */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    .product-card {
      border: 1px solid #e8e0d0; border-radius: 10px;
      overflow: hidden; text-decoration: none; background: #fff;
      transition: box-shadow 0.2s, transform 0.2s; display: flex; flex-direction: column;
    }
    .product-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,0.1); transform: translateY(-2px); }
    .product-card img { width: 100%; height: 200px; object-fit: cover; }
    .product-card-body { padding: 14px 14px 8px; flex: 1; }
    .product-card-title { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .product-card-artist { font-size: 12px; color: #8a7a6a; }
    .product-card-footer {
      padding: 10px 14px 14px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .product-card-price { font-size: 16px; font-weight: 700; color: #2d6a6a; }
    .heart-btn {
      background: none; border: none; cursor: pointer;
      color: #c0a080; font-size: 16px; padding: 4px; transition: color 0.2s;
    }
    .heart-btn:hover { color: #e05050; }

    .sub-chips {
      display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px;
    }
    .sub-chip {
      padding: 6px 16px; border-radius: 20px; font-size: 13px;
      border: 1px solid #e0d8c8; color: #5a5040; text-decoration: none;
      transition: all 0.2s; background: #fff;
    }
    .sub-chip:hover, .sub-chip.active {
      background: #2d6a6a; color: #fff; border-color: #2d6a6a;
    }

    @media (max-width: 900px) {
      .listing-layout { grid-template-columns: 1fr; }
      .filter-sidebar { position: static; }
      .product-grid { grid-template-columns: repeat(2, 1fr); }
      .page-banner { height: 300px; }
      .page-banner-content h1 { font-size: 28px; }
    }
  </style>
</head>
